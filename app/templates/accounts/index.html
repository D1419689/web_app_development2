{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>帳戶管理</h2>
    <a href="{{ url_for('account.add') }}" class="btn btn-primary">新增帳戶</a>
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>帳戶名稱</th>
                <th>初始餘額</th>
                <th>建立時間</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for acc in accounts %}
            <tr>
                <td>{{ acc.name }}</td>
                <td>{{ "%.2f"|format(acc.initial_balance) }}</td>
                <td>{{ acc.created_at }}</td>
                <td>
                    <a href="{{ url_for('account.edit', id=acc.id) }}" class="btn btn-sm btn-outline-secondary">編輯</a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center text-muted">目前沒有任何帳戶。</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
